let currentRole = null;

const shopNames = { "1": "Shop 1", "2": "Shop 2", "3": "Shop 3", "4": "Shop 4" };

const safeStr = (v) => String(v ?? "");
const toInt = (v, d = 0) => {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? n : d;
};
const toNum = (v, d = 0) => {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : d;
};

function handleLogin() {
  const role = document.getElementById("login-role").value;
  const pass = document.getElementById("login-pass").value;
  const err = document.getElementById("login-error");

  if (PASSWORDS[role] === pass) {
    err.classList.add("hidden");
    currentRole = role;
    currentShop = role === "owner" ? "all" : role;
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("app-screen").classList.remove("hidden");
    setupRolePermissions();
    initRealtimeSync();
    loadData();
  } else {
    err.classList.remove("hidden");
  }
}

function handleLogout() {
  currentRole = null;
  currentShop = null;
  document.getElementById("app-screen").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("login-pass").value = "";
  _supabase.removeAllChannels();
}

function setupRolePermissions() {
  const isOwner = currentRole === "owner";
  document.getElementById("owner-shop-filter-container").style.display = isOwner ? "block" : "none";
  document.getElementById("backup-btn").style.display = isOwner ? "block" : "none";
  document.getElementById("tab-suppliers").style.display = isOwner ? "block" : "none";
  document.getElementById("card-stock-value").style.display = isOwner ? "block" : "none";
  document.getElementById("card-profit").style.display = isOwner ? "block" : "none";
  document.getElementById("th-buy-price-rmb").style.display = isOwner ? "table-cell" : "none";
  document.getElementById("th-buy-price-kwd").style.display = isOwner ? "table-cell" : "none";
  document.getElementById("th-sales-profit").style.display = isOwner ? "table-cell" : "none";
  document.getElementById("th-inv-action").style.display = isOwner ? "table-cell" : "none";
  document.getElementById("user-display").textContent = isOwner ? "👑 Admin: Owner Master View" : `🏬 Staff: ${shopNames[currentRole]}`;

  if (!isOwner) {
    document.getElementById("owner-shop-filter").value = currentRole;
    currentShop = currentRole;
  }
  switchTab("dashboard");
}

function switchTab(tabId) {
  activeTab = tabId;
  ["dashboard", "inventory", "sales", "customers", "suppliers"].forEach((t) => {
    const view = document.getElementById(`view-${t}`);
    const btn = document.getElementById(`tab-${t}`);
    if (view) view.classList.add("hidden");
    if (btn) {
      btn.classList.remove("border-yellow-500", "text-yellow-500");
      btn.classList.add("border-transparent", "text-gray-400");
    }
  });
  document.getElementById(`view-${tabId}`).classList.remove("hidden");
  document.getElementById(`tab-${tabId}`).classList.add("border-yellow-500", "text-yellow-500");
}

function initRealtimeSync() {
  updateStatusIndicator("connecting");
  _supabase
    .channel("db-changes")
    .on("postgres_changes", { event: "*", schema: "public" }, () => loadData())
    .subscribe((status) => {
      if (status === "SUBSCRIBED") updateStatusIndicator("online");
      else if (status === "CLOSED" || status === "CHANNEL_ERROR") updateStatusIndicator("offline");
    });
}

function updateStatusIndicator(state) {
  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");
  if (state === "online") {
    dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
    txt.textContent = "Live Feed Sync Active";
    txt.className = "text-emerald-400 font-medium";
  } else if (state === "offline") {
    dot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
    txt.textContent = "Database Disconnected";
    txt.className = "text-red-400 font-medium";
  } else {
    dot.className = "w-2.5 h-2.5 rounded-full bg-orange-500";
    txt.textContent = "Establishing Feed";
    txt.className = "text-orange-400 font-medium";
  }
}

/* FIXED VERSION: handles mixed shop type (string/number), logs DB errors, avoids empty silent screens */
async function loadData() {
  try {
    if (currentRole === "owner") {
      const ownerFilterEl = document.getElementById("owner-shop-filter");
      if (ownerFilterEl) currentShop = ownerFilterEl.value;
    }

    let invQuery = _supabase.from("inventory").select("*").order("brand", { ascending: true });
    let salesQuery = _supabase.from("sales").select("*").order("id", { ascending: false });
    let custQuery = _supabase.from("customers").select("*").order("name", { ascending: true });
    let suppQuery = _supabase.from("suppliers").select("*").order("name", { ascending: true });

    if (currentShop !== "all") {
      const shopNum = toInt(currentShop, NaN);
      const shopStr = safeStr(currentShop);

      if (Number.isFinite(shopNum)) {
        invQuery = invQuery.or(`shop.eq.${shopNum},shop.eq.${shopStr}`);
        salesQuery = salesQuery.or(`shop.eq.${shopNum},shop.eq.${shopStr}`);
        custQuery = custQuery.or(`shop.eq.${shopNum},shop.eq.${shopStr}`);
      } else {
        invQuery = invQuery.eq("shop", shopStr);
        salesQuery = salesQuery.eq("shop", shopStr);
        custQuery = custQuery.eq("shop", shopStr);
      }
    }

    const [invRes, salesRes, custRes, suppRes] = await Promise.all([invQuery, salesQuery, custQuery, suppQuery]);

    if (invRes.error || salesRes.error || custRes.error || suppRes.error) {
      console.error("Supabase load errors:", {
        inventory: invRes.error,
        sales: salesRes.error,
        customers: custRes.error,
        suppliers: suppRes.error
      });
      alert("Data load error. Open browser console to see exact table error.");
    }

    globalInventory = invRes.data || [];
    globalSales = salesRes.data || [];
    globalCustomers = custRes.data || [];
    globalSuppliers = suppRes.data || [];

    calculateMetricsSummary();
    filterAllTables();
  } catch (err) {
    console.error("loadData crash:", err);
    alert("Unexpected crash while loading data. Check console.");
  }
}

function calculateMetricsSummary() {
  let totalStockQty = 0;
  let totalStockVal = 0;
  let totalProfit = 0;
  let totalReceivables = 0;

  globalInventory.forEach((item) => {
    const qty = toInt(item.qty, 0);
    const buy = toNum(item.buy_price, 0);
    totalStockQty += qty;
    totalStockVal += buy * qty;
  });

  globalSales.forEach((sale) => {
    totalProfit += toNum(sale.profit, 0);
  });

  globalCustomers.forEach((cust) => {
    totalReceivables += toNum(cust.credit, 0);
  });

  document.getElementById("stat-stock-count").textContent = `${totalStockQty.toLocaleString()} pcs`;
  document.getElementById("stat-stock-value").textContent = `${totalStockVal.toLocaleString("en-US", { maximumFractionDigits: 3 })} KD`;
  document.getElementById("stat-profit").textContent = `${totalProfit.toLocaleString("en-US", { maximumFractionDigits: 3 })} KD`;
  document.getElementById("stat-receivables").textContent = `${totalReceivables.toLocaleString("en-US", { maximumFractionDigits: 3 })} KD`;
}

function filterAllTables() {
  const invInput = document.getElementById("search-inventory");
  const salesInput = document.getElementById("search-sales");
  const custInput = document.getElementById("search-customers");
  const suppInput = document.getElementById("search-suppliers");

  const invQuery = safeStr(invInput?.value).toLowerCase().trim();
  const filteredInventory = globalInventory.filter((item) => {
    if (!invQuery) return true;
    const sName = safeStr(shopNames[item.shop]).toLowerCase();
    const bName = safeStr(item.brand).toLowerCase();
    const mName = safeStr(item.model).toLowerCase();
    const supName = safeStr(item.supplier_name || "Direct Import").toLowerCase();
    return sName.includes(invQuery) || bName.includes(invQuery) || mName.includes(invQuery) || supName.includes(invQuery);
  });
  renderInventoryTable(filteredInventory);

  const salesQuery = safeStr(salesInput?.value).toLowerCase().trim();
  const filteredSales = globalSales.filter((sale) => {
    if (!salesQuery) return true;
    const sDate = safeStr(sale.date).toLowerCase();
    const sShop = safeStr(shopNames[sale.shop]).toLowerCase();
    const sWatch = `${safeStr(sale.brand)} ${safeStr(sale.model)}`.toLowerCase();
    const sCust = findCustomerName(sale.customer_id).toLowerCase();
    return sDate.includes(salesQuery) || sShop.includes(salesQuery) || sWatch.includes(salesQuery) || sCust.includes(salesQuery);
  });
  renderSalesTable(filteredSales);

  const custQuery = safeStr(custInput?.value).toLowerCase().trim();
  const filteredCustomers = globalCustomers.filter((cust) => {
    if (!custQuery) return true;
    const cName = safeStr(cust.name).toLowerCase();
    const cPhone = safeStr(cust.phone).toLowerCase();
    const cType = safeStr(cust.type).toLowerCase();
    return cName.includes(custQuery) || cPhone.includes(custQuery) || cType.includes(custQuery);
  });
  renderCustomersTable(filteredCustomers);

  const suppQuery = safeStr(suppInput?.value).toLowerCase().trim();
  const filteredSuppliers = globalSuppliers.filter((sup) => {
    if (!suppQuery) return true;
    const nameStr = safeStr(sup.name).toLowerCase();
    const repStr = safeStr(sup.contact).toLowerCase();
    const originStr = safeStr(sup.country).toLowerCase();
    return nameStr.includes(suppQuery) || repStr.includes(suppQuery) || originStr.includes(suppQuery);
  });
  renderSuppliersTable(filteredSuppliers);
}

function renderInventoryTable(dataList) {
  const tbody = document.getElementById("table-inventory");

  const isOwner = currentRole === "owner";

  if (dataList.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${isOwner ? 10 : 7}" class="p-8 text-center text-gray-500 italic">No matching inventory records found.</td></tr>`;
    return;
  }

  dataList.forEach((item) => {
    const tr = document.createElement("tr");
    tr.className = "hover:bg-gray-700/50 transition";
    tr.innerHTML = `
      <td class="p-4 font-medium text-gray-400">${safeStr(shopNames[item.shop] || "Unknown")}</td>
      <td class="p-4 font-bold text-yellow-500 uppercase">${safeStr(item.brand || "—")}</td>
      <td class="p-4 font-medium">${safeStr(item.model || "—")}</td>
      <td class="p-4 text-gray-300 italic">${safeStr(item.supplier_name || "Direct Import")}</td>
      <td class="p-4 text-center font-bold text-white">${toInt(item.qty, 0).toLocaleString()}</td>
      ${isOwner ? `<td class="p-4 font-semibold text-amber-500">¥${toNum(item.rmb_buy_price, 0).toLocaleString("en-US", { minimumFractionDigits: 2 })}</td>` : ""}
      ${isOwner ? `<td class="p-4 font-semibold text-emerald-400">${toNum(item.buy_price, 0).toFixed(3)} KD</td>` : ""}
      <td class="p-4 font-semibold text-sky-400">${toNum(item.sell_price, 0).toFixed(3)} KD</td>
      <td class="p-4 font-semibold text-purple-400">${toNum(item.dealer_price, 0).toFixed(3)} KD</td>
      ${isOwner ? `<td class="p-4 text-right"><button onclick="confirmDeleteRecord('inventory', ${item.id})" class="text-red-500 hover:text-red-400 text-xs font-bold px-2 py-1 bg-red-950/40 rounded border border-red-900/60 transition cursor-pointer">Delete</button></td>` : ""}
    `;
    tbody.appendChild(tr);
  });
}

function renderSalesTable(dataList) {
  const tbody = document.getElementById("table-sales");
  tbody.innerHTML = "";
  const isOwner = currentRole === "owner";

  if (dataList.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${isOwner ? 10 : 9}" class="p-8 text-center text-gray-500 italic">No matching sales receipts logged.</td></tr>`;
    return;
  }

  dataList.forEach((sale) => {
    const total = toNum(sale.sell_price, 0) * toInt(sale.qty, 1);
    const paid = toNum(sale.paid, 0);
    const diff = total - paid;
    const debtStatusBadge = diff <= 0
      ? `<span class="bg-emerald-950 text-emerald-400 border border-emerald-900 px-2 py-0.5 rounded-full text-xs font-semibold">Fully Paid</span>`
      : `<span class="bg-red-950 text-red-400 border border-red-900 px-2 py-0.5 rounded-full text-xs font-semibold">Credit: ${diff.toFixed(3)} KD</span>`;

    const tr = document.createElement("tr");
    tr.className = "hover:bg-gray-700/50 transition";
    tr.innerHTML = `
      <td class="p-4 text-xs font-mono text-gray-400">${safeStr(sale.date || "—")}</td>
      <td class="p-4 text-xs text-gray-400">${safeStr(shopNames[sale.shop] || "—")}</td>
      <td class="p-4 font-semibold"><span class="text-yellow-500 uppercase font-bold mr-1">${safeStr(sale.brand || "")}</span> ${safeStr(sale.model || "")}</td>
      <td class="p-4 text-center font-bold">${toInt(sale.qty, 0)}</td>
      <td class="p-4 text-gray-300 font-medium">${safeStr(findCustomerName(sale.customer_id))}</td>
      <td class="p-4 font-bold text-white">${total.toFixed(3)} KD</td>
      <td class="p-4 font-semibold text-emerald-400">${paid.toFixed(3)} KD</td>
      <td class="p-4">${debtStatusBadge}</td>
      ${isOwner ? `<td class="p-4 font-bold text-yellow-500">${toNum(sale.profit, 0).toFixed(3)} KD</td>` : ""}
      <td class="p-4 text-right flex items-center justify-end gap-2">
        <button onclick="printInvoice(${sale.id})" class="text-xs bg-gray-700 hover:bg-gray-600 font-bold px-2 py-1 rounded text-white transition border border-gray-600 cursor-pointer">🖨️ Print</button>
        ${isOwner ? `<button onclick="confirmDeleteRecord('sales', ${sale.id})" class="text-red-500 hover:text-red-400 text-xs font-bold px-2 py-1 bg-red-950/40 rounded border border-red-900/60 transition cursor-pointer">Delete</button>` : ""}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderCustomersTable(dataList) {

  dataList.forEach((cust) => {

    const tr = document.createElement("tr");
    tr.className = "hover:bg-gray-700/50 transition";
    tr.innerHTML = `
      <td class="p-4 font-bold text-white">${safeStr(cust.name || "")}</td>
      <td class="p-4 font-mono text-xs text-gray-400">${safeStr(cust.phone || "—")}</td>
      <td class="p-4"><span class="px-2 py-0.5 rounded text-xs font-semibold ${cust.type === "Dealer" ? "bg-purple-950 text-purple-400 border border-purple-900" : "bg-blue-950 text-blue-400 border border-blue-900"}">${safeStr(cust.type || "Retail")}</span></td>
      <td class="p-4 font-medium text-gray-300">${toInt(cust.paid, 0).toLocaleString()} Purchases</td>
      <td class="p-4 font-bold text-md ${creditVal > 0 ? "text-red-400" : "text-gray-500"}">${creditVal.toFixed(3)} KD</td>
      <td class="p-4 text-right">
        <button onclick="openPaymentCollectionModal(${cust.id})" class="text-xs bg-emerald-700 hover:bg-emerald-600 font-bold px-2.5 py-1 rounded text-white transition cursor-pointer">💵 Receive Money</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderSuppliersTable(dataList) {
  const tbody = document.getElementById("table-suppliers");

  if (!dataList || dataList.length === 0) {

  dataList.forEach((sup) => {
    const tr = document.createElement("tr");
    tr.className = "hover:bg-gray-700/50 transition border-b border-gray-800";
    tr.innerHTML = `
      <td class="p-4 font-bold text-white">${safeStr(sup.name || "—")}</td>
      <td class="p-4 font-medium text-gray-300">${safeStr(sup.contact || "—")}</td>
      <td class="p-4 font-mono text-xs text-gray-400">${safeStr(sup.phone || "—")}</td>
      <td class="p-4 text-xs text-gray-400 uppercase tracking-wider">${safeStr(sup.country || "—")}</td>

    `;
    tbody.appendChild(tr);
  });
}

function findCustomerName(id) {
  const found = globalCustomers.find((c) => c.id == id);
  return found ? safeStr(found.name) : "Walking Retail Customer";
}
