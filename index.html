<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Wadi Watches Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
            <h1 class="text-2xl font-bold text-center mb-6 text-yellow-500">Al Wadi Watches</h1>
            <select id="login-role" class="w-full bg-gray-700 border border-gray-600 rounded p-2.5 mb-4 text-white">
                <option value="owner">Owner</option>
                <option value="1">Shop 1</option>
            </select>
            <input type="password" id="login-pass" class="w-full bg-gray-700 border border-gray-600 rounded p-2.5 mb-6 text-white" placeholder="Password">
            <button onclick="handleLogin()" class="w-full bg-yellow-600 p-3 rounded font-bold">Login</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex flex-col min-h-screen">
        <nav class="bg-gray-800 border-b border-gray-700 flex">
            <button onclick="switchTab('inventory')" class="px-6 py-4 font-bold text-yellow-500">Inventory</button>
            <button onclick="switchTab('sales')" class="px-6 py-4 font-bold text-gray-400">Sales</button>
            <button onclick="switchTab('customers')" class="px-6 py-4 font-bold text-gray-400">Customers</button>
            <button onclick="switchTab('suppliers')" class="px-6 py-4 font-bold text-gray-400">Suppliers</button>
        </nav>

        <main class="p-6">
            <div id="view-inventory" class="tab-view">
                <button onclick="openModal('inventory')" class="bg-yellow-600 px-4 py-2 mb-4 rounded">+ Add Stock</button>
                <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
                    <thead class="bg-gray-700 text-xs uppercase"><tr><th class="p-4">Brand</th><th class="p-4">Model</th><th class="p-4">Qty</th><th class="p-4">Price</th></tr></thead>
                    <tbody id="table-inventory"></tbody>
                </table>
            </div>

            <div id="view-sales" class="tab-view hidden">
                <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
                    <thead class="bg-gray-700 text-xs uppercase"><tr><th class="p-4">Date</th><th class="p-4">Item</th><th class="p-4">Paid</th></tr></thead>
                    <tbody id="table-sales"></tbody>
                </table>
            </div>

            <div id="view-customers" class="tab-view hidden">
                <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
                    <thead class="bg-gray-700 text-xs uppercase"><tr><th class="p-4">Name</th><th class="p-4">Phone</th><th class="p-4">Credit</th></tr></thead>
                    <tbody id="table-customers"></tbody>
                </table>
            </div>

            <div id="view-suppliers" class="tab-view hidden">
                <button onclick="openModal('suppliers')" class="bg-yellow-600 px-4 py-2 mb-4 rounded">+ Add Supplier</button>
                <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
                    <thead class="bg-gray-700 text-xs uppercase"><tr><th class="p-4">Name</th><th class="p-4">Contact</th><th class="p-4">Country</th></tr></thead>
                    <tbody id="table-suppliers"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const _supabase = supabase.createClient("https://sauwqklxwmzhkkidvony.supabase.co", "YOUR_ANON_KEY");

        function switchTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }

        async function loadData() {
            const [inv, sal, cus, sup] = await Promise.all([
                _supabase.from('inventory').select('*'),
                _supabase.from('sales').select('*'),
                _supabase.from('customers').select('*'),
                _supabase.from('suppliers').select('*')
            ]);
            
            // Re-use a universal function that builds rows based on the actual columns in the database
            renderTable('table-inventory', inv.data || []);
            renderTable('table-sales', sal.data || []);
            renderTable('table-customers', cus.data || []);
            renderTable('table-suppliers', sup.data || []);
        }

        function renderTable(tbodyId, data) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-center">No records found.</td></tr>`;
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                // This line automatically grabs every field (Brand, Model, Qty, etc) and makes a cell for it
                tr.innerHTML = Object.values(item).map(val => `<td class="p-4 border-b border-gray-700">${val}</td>`).join('');
                tbody.appendChild(tr);
            });
        }

        function handleLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            loadData();
        }
    </script>
</body>
</html>
